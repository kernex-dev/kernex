name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about.
  - type: dropdown
    id: crate
    attributes:
      label: Related Crate
      options:
        - kernex-core
        - kernex-sandbox
        - kernex-providers
        - kernex-memory
        - kernex-skills
        - kernex-pipelines
        - kernex-runtime
        - Other / Multiple
