# Release-PR + tag workflow.
#
# Triggers on push to `main`. release-plz runs in its default mode (both
# `release-pr` and `release` commands in sequence):
#
# 1. `release-pr`: analyzes conventional commits since the last `v*` tag and
#    either opens or updates a Release PR with the proposed version bump and
#    a CHANGELOG diff. The PR is a regular non-draft PR for human review.
#
# 2. `release`: looks at the current Cargo.toml `[workspace.package].version`
#    and compares against the last `v*` tag. If Cargo.toml > last tag (which
#    is true right after a Release PR merges), creates and pushes the
#    `v{version}` tag. The tag push then triggers `publish-crates.yml` to
#    run the OIDC publish chain.
#
# Permissions: `contents: write` (push the release branch and tag),
# `pull-requests: write` (open the Release PR). No registry or org-secret
# scope is needed here; publishing happens in a separate workflow via OIDC.
#
# Historical: until commit <FUTURE>, this workflow ran with `command:
# release-pr` only, which never tagged. Release PRs merged but no v* tag
# appeared, leaving the workspace in a release-plz loop because Cargo.toml
# > last tag kept proposing the same bump. Dropping the `command:` override
# lets release-plz close the loop by tagging.

name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Mint a short-lived GitHub App installation token. Using a user-
      # identity token (vs the default GITHUB_TOKEN) is the only way to
      # work around GitHub's recursion-prevention rule that silently drops
      # workflow triggers for refs pushed by GITHUB_TOKEN. With this App
      # token, release-plz's branch push fires CI on the Release PR, and
      # its tag push fires publish-crates.yml automatically. The
      # `RELEASE_PLZ_APP_ID` (repo variable) and
      # `RELEASE_PLZ_APP_PRIVATE_KEY` (repo secret) are configured at the
      # repo level; the App must be installed on this repo with Contents
      # (read+write) and Pull requests (read+write) permissions.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # release-plz needs full git history to derive CHANGELOG entries
          # from conventional commits between the last tag and HEAD.
          fetch-depth: 0
          # Use the App token so the remote's stored credentials are tied
          # to the App identity. Subsequent git push operations (branch
          # for the Release PR, tag for the release) then use the App
          # identity and trigger downstream workflows.
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz (release-pr + release)
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        # No `command:` override: runs both `release-pr` (opens / updates the
        # draft Release PR) and `release` (creates the v* tag once a Release
        # PR has merged and Cargo.toml > last tag). The tag push then fires
        # publish-crates.yml.
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
