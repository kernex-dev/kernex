name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Bump this string to force a fresh Swatinem/rust-cache namespace across all
  # jobs. The 2026-05-10 v0-rust cache for `Test (ubuntu-22.04)` poisoned to a
  # state where `cargo test --workspace --locked` resolved a target/ that no
  # longer matched the dep graph and could not find `sqlx` at compile time
  # (4-second compile finish on Linux 22.04, vs ~90 s cold). All other matrix
  # jobs were unaffected. Rotating to v1-rust-2026-05-10 forces a clean
  # rebuild and isolates the failure window.
  CACHE_NAMESPACE: v1-rust-2026-05-10

jobs:
  check:
    name: Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: ${{ env.CACHE_NAMESPACE }}
      - run: cargo build --workspace --locked

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: ${{ env.CACHE_NAMESPACE }}
      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny --locked
      - name: Run cargo-audit
        run: cargo audit
      - name: Run cargo-deny
        run: cargo deny check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: ${{ env.CACHE_NAMESPACE }}
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest pins to 24.04 (kernel 6.x). ubuntu-22.04 ships with kernel
        # 5.15, which exercises the Landlock partial-enforcement path (full ABI
        # support landed in 5.19). Keeping both surfaces drift in the sandbox
        # layer that single-runner coverage misses.
        os: [ubuntu-latest, ubuntu-22.04, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: ${{ env.CACHE_NAMESPACE }}
      - run: cargo test --workspace --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  examples:
    name: Examples and benches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: ${{ env.CACHE_NAMESPACE }}
      - name: Build examples
        run: cargo build --workspace --examples --locked
      - name: Compile benches (no run)
        run: cargo bench --workspace --no-run --locked

  cold_start_gate:
    # Hard CI gate on `cold_start/memory_search_cold_start` from
    # bench/benches/cold_start.rs. Threshold = 50 ms median (the
    # size-vs-perf locking value that flips the release profile to
    # `release-fast` if exceeded). Local macOS aarch64 baseline at the
    # initial profile-baseline cut: 1.87-1.94 ms (~25x headroom). CI
    # runs on Linux ubuntu-latest, which is noisier than dedicated
    # hardware, but the headroom is wide enough that criterion variance
    # never approaches the gate.
    name: Cold-start CI gate (50 ms threshold)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: ${{ env.CACHE_NAMESPACE }}
      - name: Run cold_start/memory_search_cold_start
        run: |
          set -o pipefail
          cargo bench -p kernex-bench --bench cold_start --locked -- \
            memory_search_cold_start 2>&1 | tee /tmp/cold_start.log
      - name: Enforce 50 ms median threshold
        run: bash scripts/check-cold-start.sh /tmp/cold_start.log 50

  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install actionlint
        run: |
          curl -sL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            | tar xz actionlint
      - name: Run actionlint
        run: ./actionlint -color

  publish-chain:
    name: Publish-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Validate publish-chain (no publishable -> publish=false edges)
        run: ./scripts/validate-publish-chain.sh
